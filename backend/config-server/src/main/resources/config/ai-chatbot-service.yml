server:
  port: 8089

spring:
  datasource:
    url: jdbc:postgresql://postgres-chatbot-db:5432/chatbot_db
    username: pharma
    password: pharma_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.4
          max-tokens: 1024
          stream: true

chatbot:
  memory:
    window-size: 10
  rate-limit:
    messages-per-hour: 50
  session:
    idle-expiry-days: 30

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
